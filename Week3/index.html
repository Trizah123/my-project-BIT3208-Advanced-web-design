<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediStore – Add Medicine</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">
    <h1>🏥 MediStore</h1>
    <h2>Medicine Registration</h2>

    <form id="medicineForm" novalidate>

      <div class="form-group">
        <label for="medName">Medicine Name</label>
        <input type="text" id="medName" placeholder="e.g. Paracetamol" />
        <span class="error" id="medNameError"></span>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="">-- Select Category --</option>
          <option value="Tablet">Tablet</option>
          <option value="Syrup">Syrup</option>
          <option value="Injection">Injection</option>
          <option value="Capsule">Capsule</option>
        </select>
        <span class="error" id="categoryError"></span>
      </div>

      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" placeholder="e.g. 100" />
        <span class="error" id="quantityError"></span>
      </div>

      <div class="form-group">
        <label for="price">Price (KSh)</label>
        <input type="number" id="price" placeholder="e.g. 250" />
        <span class="error" id="priceError"></span>
      </div>

      <div class="form-group">
        <label for="expiryDate">Expiry Date</label>
        <input type="date" id="expiryDate" />
        <span class="error" id="expiryDateError"></span>
      </div>

      <div class="form-group">
        <label for="supplier">Supplier Name</label>
        <input type="text" id="supplier" placeholder="e.g. PharmaCo Ltd" />
        <span class="error" id="supplierError"></span>
      </div>

      <button type="submit" class="btn">Add Medicine</button>
      <div class="success" id="successMsg"></div>

    </form>

    <!-- Medicine Table (filled by JavaScript) -->
    <h2>Medicine List</h2>
    <table id="medicineTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Expiry</th>
          <th>Supplier</th>
        </tr>
      </thead>
      <tbody id="medicineTableBody">
        <!-- Rows added here by JS -->
      </tbody>
    </table>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
